<section class="projects-section" [class.designer-section]="themeService.currentTheme() === 'designer'">
  <div class="container">
    @if (themeService.currentTheme() === 'designer') {
      <h2 class="subtitle">Projects Done</h2>
    } @else {
      <h2 class="subtitle">Personal Projects</h2>
    }
    
    <div class="projects-grid">
      <app-project-card 
        *ngFor="let project of projects"
        [project]="project">
      </app-project-card>
    </div>
  </div>
</section>
