<section class="experience-section" [class.designer-section]="themeService.currentTheme() === 'designer'">
  <div class="container">
    <h2 class="subtitle">Work Experience</h2>
    
    <div class="timeline">
      <!-- Timeline Line -->
      <div class="timeline-line"></div>
      
      <!-- Experience Cards -->
      <div class="experience-list">
        <app-experience-card 
          *ngFor="let experience of experiences; let last = last"
          [experience]="experience"
          [class.last-item]="last">
        </app-experience-card>
      </div>
    </div>
  </div>
</section>
